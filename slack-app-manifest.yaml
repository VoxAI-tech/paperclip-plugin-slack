_metadata:
  major_version: 2
  minor_version: 1
display_information:
  name: Vox AI HQ
  description: Paperclip agent notifications, approvals, and bidirectional reply routing.
  long_description: "Connects your Paperclip AI agent organization to Slack. Agents post notifications about issues, approvals, and errors. You reply in Slack threads and your responses become Paperclip issue comments automatically. Approve or reject agent requests with inline buttons. Includes /status, /issues, and /agents slash commands."
  background_color: "#1a1a2e"
features:
  bot_user:
    display_name: HQ Bot
    always_online: true
  slash_commands:
    - command: /hq-status
      description: Show company status - agents, issues, spend, approvals
      should_escape: false
    - command: /hq-issues
      description: List open issues across all projects
      should_escape: false
    - command: /hq-agents
      description: List all agents and their current status
      should_escape: false
oauth_config:
  scopes:
    bot:
      - chat:write
      - chat:write.customize
      - reactions:write
      - commands
      - channels:history
      - channels:read
      - groups:history
      - groups:read
      - im:history
      - users:read
settings:
  event_subscriptions:
    bot_events:
      - message.channels
      - message.groups
  interactivity:
    is_enabled: true
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
